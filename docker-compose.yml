version: "3.9"

services:
  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth
    environment:
      - AUTH_SERVICE_URL=http://auth:5001

  auth:
    build: ./auth-services
    ports:
      - "5001:5001"
    env_file:
      - ./auth-services/.env
